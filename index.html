<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --accent: #6366f1;
      --accent-dim: #4f46e5;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --danger: #ef4444;
      --success: #22c55e;
      --warn: #f59e0b;
      --radius: 12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: calc(14px + var(--safe-top)) 20px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    h1 span { color: var(--accent); }

    .stats { display: flex; gap: 10px; }
    .stat {
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 3px 10px;
      border-radius: 20px;
    }
    .stat strong { color: var(--text); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-btn.trash-tab.active { background: var(--danger); border-color: var(--danger); }

    /* ── Main list ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 8px;
      padding-top: 40px;
    }
    .empty-icon { font-size: 3rem; }
    .empty p { font-size: 0.88rem; }

    /* ── Task row (swipe wrapper) ── */
    .task-row {
      position: relative;
      border-radius: var(--radius);
      flex-shrink: 0;
    }

    .swipe-bg {
      position: absolute;
      inset: 0;
      background: var(--danger);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 22px;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      gap: 5px;
      pointer-events: none;
    }

    /* ── Task card ── */
    .task {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 12px 11px 6px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      position: relative;
      will-change: transform;
    }

    .task::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: var(--radius) 0 0 var(--radius);
    }
    .task[data-priority="high"]::before   { background: var(--danger); }
    .task[data-priority="medium"]::before { background: var(--warn); }
    .task[data-priority="low"]::before    { background: var(--success); }

    /* Done styling: dim content, not the whole card (keeps card opaque over swipe-bg) */
    .task.done .task-body { opacity: 0.55; }
    .task.done .drag-handle,
    .task.done .edit-btn,
    .task.done .del-btn { opacity: 0.35; }
    .task.done .task-title { text-decoration: line-through; color: var(--muted); }
    .task.trashed { opacity: 0.55; }

    /* ── Drag handle ── */
    .drag-handle {
      width: 18px;
      min-height: 36px;
      background: transparent;
      border: none;
      color: var(--border);
      cursor: grab;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      letter-spacing: -2px;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
      margin-left: 2px;
    }
    .drag-handle:active { color: var(--muted); }

    /* ── Check button ── */
    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .task.done .check-btn {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    /* ── Task body ── */
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 0.93rem; font-weight: 500; line-height: 1.4; word-break: break-word; }
    .task-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }

    .tag {
      font-size: 0.66rem;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 500;
    }
    .tag-cat  { background: color-mix(in srgb,var(--accent)  18%,transparent); color: #a5b4fc; }
    .tag-due  { background: color-mix(in srgb,var(--warn)    15%,transparent); color: var(--warn); }
    .tag-due.overdue { background: color-mix(in srgb,var(--danger) 18%,transparent); color: var(--danger); }
    .tag-ph   { background: color-mix(in srgb,var(--danger)  18%,transparent); color: var(--danger); }
    .tag-pm   { background: color-mix(in srgb,var(--warn)    18%,transparent); color: var(--warn); }
    .tag-pl   { background: color-mix(in srgb,var(--success) 18%,transparent); color: var(--success); }
    .tag-rem  { background: color-mix(in srgb,#818cf8 18%,transparent); color: #818cf8; }

    /* ── Card buttons ── */
    .del-btn, .edit-btn, .restore-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      font-size: 0.95rem;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }
    .del-btn   { color: var(--muted); }
    .del-btn:active { color: var(--danger); }
    .edit-btn  { color: var(--muted); font-size: 0.9rem; }
    .edit-btn:active { color: var(--accent); }
    .restore-btn { color: var(--success); font-size: 1.1rem; }

    /* ── Drag placeholder ── */
    .drag-ph {
      border: 2px dashed var(--accent);
      border-radius: var(--radius);
      opacity: 0.35;
      flex-shrink: 0;
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(22px + var(--safe-bot));
      right: 22px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99,102,241,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .fab:active { transform: scale(0.92); background: var(--accent-dim); }

    /* ── Sheet overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 20;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 22px 18px calc(22px + var(--safe-bot));
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
      max-height: 92vh;
      overflow-y: auto;
    }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet h2 { font-size: 1.05rem; margin-bottom: 16px; }

    .field { margin-bottom: 13px; }
    .field label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field input, .field select {
      width: 100%;
      padding: 10px 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.93rem;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field input[type="date"]::-webkit-calendar-picker-indicator,
    .field input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: .5; }
    .field select option { background: var(--surface2); }

    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .btn-primary:active { background: var(--accent-dim); }

    .missed-banner {
      display: none;
      background: var(--warn);
      color: #000;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 14px;
      text-align: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .missed-banner.visible { display: block; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <h1>My <span>Tasks</span></h1>
      <div class="stats">
        <div class="stat"><strong id="stat-done">0</strong> done</div>
        <div class="stat"><strong id="stat-left">0</strong> left</div>
        <div class="stat" id="app-version">v1.0.1</div>
      </div>
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
      <button class="filter-btn" data-filter="high">🔴 High</button>
      <button class="filter-btn" data-filter="medium">🟡 Medium</button>
      <button class="filter-btn" data-filter="low">🟢 Low</button>
      <button class="filter-btn trash-tab" data-filter="trash">🗑 Trash</button>
    </div>
  </header>

  <div class="missed-banner" id="missed-banner" role="alert"></div>
  <main id="task-list"></main>
  <button class="fab" id="fab" aria-label="Add task">+</button>
</div>

<!-- Add / Edit Task Sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <h2 id="sheet-title">New Task</h2>
    <div class="field">
      <label>Title</label>
      <input type="text" id="inp-title" placeholder="What needs to be done?" maxlength="120" />
    </div>
    <div class="row">
      <div class="field">
        <label>Priority</label>
        <select id="inp-priority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="inp-cat">
          <option>Personal</option>
          <option>Work</option>
          <option>Shopping</option>
          <option>Health</option>
          <option>Finance</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Due Date</label>
        <input type="date" id="inp-due" />
      </div>
      <div class="field">
        <label>Time</label>
        <input type="time" id="inp-time" />
      </div>
    </div>
    <div class="field">
      <label>Reminder</label>
      <select id="inp-reminder">
        <option value="none">No reminder</option>
        <option value="at">At due time</option>
        <option value="5m">5 minutes before</option>
        <option value="15m">15 minutes before</option>
        <option value="30m">30 minutes before</option>
        <option value="1h">1 hour before</option>
        <option value="1d">1 day before</option>
      </select>
    </div>
    <button class="btn-primary" id="btn-add">Add Task</button>
  </div>
</div>

<script>
  // ── Web Push config ────────────────────────────────────────────────
  const VAPID_PUBLIC_KEY = 'BGBXCVQaqUnUxz3b_v5PNkelEfQlXGIf-UH4qwaC6jtkvaOm9Kvpq8LTvHjah1Jm_4pTVydoJbUJWOzeK-Z3bu4';
  const WORKER_URL = 'https://task-reminders.je-task-worker.workers.dev';

  // ── State ──────────────────────────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let trash = JSON.parse(localStorage.getItem('trash') || '[]');
  let filter = 'all';
  let editingId = null;
  let pushSubscription = null;
  const pendingDone = new Set(); // IDs of tasks just marked done, animating out
  const firedReminders = new Set(JSON.parse(localStorage.getItem('firedReminders') || '[]'));

  const save = () => {
    localStorage.setItem('tasks', JSON.stringify(tasks));
    localStorage.setItem('trash', JSON.stringify(trash));
  };

  // ── Helpers ────────────────────────────────────────────────────────
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  function formatDue(due, time) {
    if (!due) return '';
    const [y, m, d] = due.split('-');
    if (!time) return `${m}/${d}/${y.slice(2)}`;
    const [h, mn] = time.split(':').map(Number);
    const ap = h >= 12 ? 'PM' : 'AM';
    return `${m}/${d}/${y.slice(2)} ${h % 12 || 12}:${String(mn).padStart(2,'0')} ${ap}`;
  }

  function reminderMs(task) {
    if (!task.reminder || task.reminder === 'none' || !task.due) return null;
    const [y, m, d] = task.due.split('-').map(Number);
    const [h, mn] = (task.dueTime || '09:00').split(':').map(Number);
    const due = new Date(y, m - 1, d, h, mn).getTime();
    const off = { at: 0, '5m': -3e5, '15m': -9e5, '30m': -18e5, '1h': -36e5, '1d': -864e5 };
    return due + (off[task.reminder] ?? 0);
  }

  // ── Notifications ──────────────────────────────────────────────────
  async function askNotif() {
    if (!('Notification' in window)) return false;
    if (Notification.permission === 'granted') return true;
    return (await Notification.requestPermission()) === 'granted';
  }

  function showNotification(task) {
    // Use SW-backed showNotification so it works even when tab is backgrounded
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready
        .then(reg => reg.showNotification('Task Reminder', {
          body: task.title,
          icon: './icon-192.png',
          tag: task.id,
        }))
        .catch(() => new Notification('Task Reminder', { body: task.title, icon: './icon-192.png', tag: task.id }));
    } else {
      new Notification('Task Reminder', { body: task.title, icon: './icon-192.png', tag: task.id });
    }
  }

  function checkReminders(missedWindowMs) {
    if (Notification.permission !== 'granted') return;
    const now = Date.now();
    let missedCount = 0;
    tasks.filter(t => !t.done).forEach(task => {
      const ms = reminderMs(task);
      if (!ms) return;
      const remKey = task.id + ':' + ms;
      if (firedReminders.has(remKey)) return;
      if (ms <= now && now - ms < missedWindowMs) {
        firedReminders.add(remKey);
        localStorage.setItem('firedReminders', JSON.stringify([...firedReminders]));
        if (now - ms < 35000) {
          // Fired on time (within the polling window) — show notification normally
          showNotification(task);
        } else {
          // Missed while app was closed — count for the banner instead of a stale notification
          missedCount++;
        }
      }
    });
    if (missedCount > 0) showMissedBanner(missedCount);
  }

  function showMissedBanner(count) {
    const banner = document.getElementById('missed-banner');
    if (!banner) return;
    banner.textContent = `${count} reminder${count > 1 ? 's' : ''} fired while the app was closed. Tap to dismiss.`;
    banner.classList.add('visible');
    banner.onclick = () => banner.classList.remove('visible');
  }

  function scheduleReminders() {
    if (window._remInterval) clearInterval(window._remInterval);
    // On open: catch reminders missed in the last 24 hours while app was closed
    checkReminders(24 * 60 * 60 * 1000);
    // Poll every 30 seconds while app is open
    window._remInterval = setInterval(() => checkReminders(35000), 30000);
  }

  // ── Web Push ───────────────────────────────────────────────────────
  function urlB64ToUint8Array(b64) {
    const pad = '='.repeat((4 - (b64.length % 4)) % 4);
    const raw = atob(b64.replace(/-/g, '+').replace(/_/g, '/') + pad);
    return Uint8Array.from(raw, c => c.charCodeAt(0));
  }

  async function initPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    if (Notification.permission !== 'granted') return;
    try {
      const reg = await navigator.serviceWorker.ready;
      pushSubscription = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    } catch (err) {
      console.warn('Push subscription failed:', err);
    }
  }

  async function registerReminder(task) {
    if (!pushSubscription) return;
    const ms = reminderMs(task);
    if (!ms) return;
    try {
      await fetch(`${WORKER_URL}/subscribe`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          subscription: pushSubscription.toJSON(),
          taskId: task.id,
          taskTitle: task.title,
          reminderMs: ms,
        }),
      });
    } catch (err) {
      console.warn('Failed to register reminder with Worker:', err);
    }
  }

  async function cancelReminder(taskId) {
    if (!pushSubscription) return;
    try {
      await fetch(`${WORKER_URL}/reminder`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ taskId }),
      });
    } catch (err) {
      console.warn('Failed to cancel reminder with Worker:', err);
    }
  }

  // ── Render ─────────────────────────────────────────────────────────
  function render() {
    const list = document.getElementById('task-list');
    const today = new Date().toISOString().slice(0, 10);
    const done = tasks.filter(t => t.done).length;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-left').textContent = tasks.length - done;

    if (filter === 'trash') {
      if (!trash.length) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">🗑</div><p>Trash is empty</p></div>`;
      } else {
        list.innerHTML = trash.map(t => `
          <div class="task-row">
            <div class="task trashed" data-priority="${t.priority}">
              <div class="task-body">
                <div class="task-title">${esc(t.title)}</div>
                <div class="task-meta">
                  <span class="tag tag-cat">${esc(t.cat)}</span>
                  <span class="tag tag-p${t.priority[0]}">${t.priority}</span>
                </div>
              </div>
              <button class="restore-btn" onclick="restore('${t.id}')" title="Restore">↩</button>
              <button class="del-btn" onclick="deletePerm('${t.id}')" title="Delete forever">✕</button>
            </div>
          </div>`).join('');
      }
      return;
    }

    const vis = tasks.filter(t => {
      if (filter === 'done')   return t.done;
      if (filter === 'active') return !t.done;
      if (filter === 'high')   return t.priority === 'high'   && !t.done;
      if (filter === 'medium') return t.priority === 'medium' && !t.done;
      if (filter === 'low')    return t.priority === 'low'    && !t.done;
      // 'all': active tasks + ones just marked done (still animating out)
      return !t.done || pendingDone.has(t.id);
    });

    if (!vis.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><p>Nothing here — enjoy the peace!</p></div>`;
      return;
    }

    const showDrag = filter === 'all';
    list.innerHTML = vis.map(t => {
      const overdue = t.due && t.due < today && !t.done;
      const dueTag = t.due
        ? `<span class="tag tag-due${overdue ? ' overdue' : ''}">${overdue ? '⚠ ' : ''}${formatDue(t.due, t.dueTime)}</span>`
        : '';
      const remTag = t.reminder && t.reminder !== 'none' ? `<span class="tag tag-rem">🔔</span>` : '';
      const dragBtn = showDrag ? `<button class="drag-handle" data-id="${t.id}" aria-label="Reorder">⋮⋮</button>` : '';
      const editBtn = !t.done
        ? `<button class="edit-btn" onclick="openEditSheet('${t.id}')" aria-label="Edit">✎</button>`
        : '';
      return `
        <div class="task-row" data-id="${t.id}">
          <div class="swipe-bg">🗑 Delete</div>
          <div class="task${t.done ? ' done' : ''}" data-id="${t.id}" data-priority="${t.priority}">
            ${dragBtn}
            <button class="check-btn" onclick="toggle('${t.id}')">${t.done ? '✓' : ''}</button>
            <div class="task-body">
              <div class="task-title">${esc(t.title)}</div>
              <div class="task-meta">
                <span class="tag tag-cat">${esc(t.cat)}</span>
                <span class="tag tag-p${t.priority[0]}">${t.priority}</span>
                ${dueTag}${remTag}
              </div>
            </div>
            ${editBtn}
            <button class="del-btn" onclick="softDelete('${t.id}')" aria-label="Delete">✕</button>
          </div>
        </div>`;
    }).join('');

    list.querySelectorAll('.task-row[data-id]').forEach(row => initSwipe(row));
    if (showDrag) list.querySelectorAll('.drag-handle').forEach(h => initDrag(h));
  }

  // ── Swipe to delete ────────────────────────────────────────────────
  function initSwipe(row) {
    const card = row.querySelector('.task');
    let sx = 0, sy = 0, cx = null, dir = null, ready = false;

    card.addEventListener('touchstart', e => {
      if (e.target.closest('.check-btn,.del-btn,.edit-btn,.drag-handle,.restore-btn')) return;
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
      cx = null; dir = null; ready = true;
      card.style.transition = 'none';
    }, { passive: true });

    card.addEventListener('touchmove', e => {
      if (!ready) return;
      const dx = e.touches[0].clientX - sx;
      const dy = e.touches[0].clientY - sy;
      if (!dir && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
        dir = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      }
      if (dir === 'h' && dx < 0) {
        e.preventDefault();
        cx = Math.max(dx, -150);
        card.style.transform = `translateX(${cx}px)`;
      }
    }, { passive: false });

    card.addEventListener('touchend', () => {
      if (!ready) return;
      ready = false;
      if (typeof cx === 'number' && cx < -90) {
        card.style.transition = 'transform 0.22s';
        card.style.transform = 'translateX(-110%)';
        setTimeout(() => softDelete(row.dataset.id), 210);
      } else if (typeof cx === 'number') {
        card.style.transition = 'transform 0.2s';
        card.style.transform = '';
      }
      cx = null; dir = null;
    }, { passive: true });
  }

  // ── Drag to reorder ────────────────────────────────────────────────
  const dg = {};

  function initDrag(handle) {
    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      e.stopPropagation();
      const id = handle.dataset.id;
      const row = document.querySelector(`.task-row[data-id="${id}"]`);
      if (!row) return;
      const rect = row.getBoundingClientRect();
      const ty = e.touches[0].clientY;

      const ghost = row.cloneNode(true);
      Object.assign(ghost.style, {
        position: 'fixed', left: rect.left + 'px', top: rect.top + 'px',
        width: rect.width + 'px', zIndex: 1000, pointerEvents: 'none',
        opacity: .95, transform: 'scale(1.03)',
        boxShadow: '0 10px 40px rgba(0,0,0,.5)', borderRadius: '12px'
      });
      document.body.appendChild(ghost);

      const ph = document.createElement('div');
      ph.className = 'drag-ph';
      ph.style.height = rect.height + 'px';
      row.before(ph);
      row.style.visibility = 'hidden';

      Object.assign(dg, { on: true, id, ghost, ph, row, oy: ty - rect.top });
      document.addEventListener('touchmove', onDgMove, { passive: false });
      document.addEventListener('touchend', onDgEnd, { once: true });
    }, { passive: false });
  }

  function onDgMove(e) {
    if (!dg.on) return;
    e.preventDefault();
    const ty = e.touches[0].clientY;
    dg.ghost.style.top = (ty - dg.oy) + 'px';
    const list = document.getElementById('task-list');
    const rows = [...list.querySelectorAll('.task-row[data-id]')].filter(r => r.style.visibility !== 'hidden');
    let placed = false;
    for (const r of rows) {
      const rb = r.getBoundingClientRect();
      if (ty < rb.top + rb.height / 2) { r.before(dg.ph); placed = true; break; }
    }
    if (!placed) list.append(dg.ph);
  }

  function onDgEnd() {
    if (!dg.on) return;
    document.removeEventListener('touchmove', onDgMove);
    const list = document.getElementById('task-list');
    const kids = [...list.children];
    const phIdx = kids.indexOf(dg.ph);
    const beforeIds = kids.slice(0, phIdx)
      .filter(el => el.classList?.contains('task-row') && el.dataset.id)
      .map(el => el.dataset.id);

    const ti = tasks.findIndex(t => t.id === dg.id);
    const [task] = tasks.splice(ti, 1);
    if (!beforeIds.length) {
      tasks.unshift(task);
    } else {
      const ai = tasks.findIndex(t => t.id === beforeIds[beforeIds.length - 1]);
      tasks.splice(ai + 1, 0, task);
    }

    dg.ghost.remove(); dg.ph.remove();
    dg.row.style.visibility = '';
    dg.on = false;
    save(); render();
  }

  // ── Actions ────────────────────────────────────────────────────────
  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    if (!t.done) {
      t.done = true;
      pendingDone.add(id); // must be added before render() so filter sees it
      save();
      render();
      setTimeout(() => {
        pendingDone.delete(id);
        render();
      }, 3000);
    } else {
      t.done = false;
      pendingDone.delete(id);
      save();
      render();
    }
  }

  function softDelete(id) {
    const i = tasks.findIndex(t => t.id === id);
    if (i < 0) return;
    const [t] = tasks.splice(i, 1);
    t.deletedAt = Date.now();
    trash.unshift(t);
    save(); render();
    cancelReminder(id);
  }

  function restore(id) {
    const i = trash.findIndex(t => t.id === id);
    if (i < 0) return;
    const [t] = trash.splice(i, 1);
    delete t.deletedAt;
    tasks.unshift(t);
    save(); render();
  }

  function deletePerm(id) {
    trash = trash.filter(t => t.id !== id);
    save(); render();
  }

  // ── Sheet ──────────────────────────────────────────────────────────
  function openSheet() {
    editingId = null;
    document.getElementById('sheet-title').textContent = 'New Task';
    document.getElementById('btn-add').textContent = 'Add Task';
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-priority').value = 'medium';
    document.getElementById('inp-cat').value = 'Personal';
    document.getElementById('inp-due').value = '';
    document.getElementById('inp-time').value = '';
    document.getElementById('inp-reminder').value = 'none';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('inp-title').focus(), 300);
  }

  function openEditSheet(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    editingId = id;
    document.getElementById('sheet-title').textContent = 'Edit Task';
    document.getElementById('btn-add').textContent = 'Save Changes';
    document.getElementById('inp-title').value = t.title;
    document.getElementById('inp-priority').value = t.priority;
    document.getElementById('inp-cat').value = t.cat;
    document.getElementById('inp-due').value = t.due || '';
    document.getElementById('inp-time').value = t.dueTime || '';
    document.getElementById('inp-reminder').value = t.reminder || 'none';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('inp-title').focus(), 300);
  }

  function closeSheet() {
    editingId = null;
    document.getElementById('overlay').classList.remove('open');
  }

  async function addTask() {
    const title = document.getElementById('inp-title').value.trim();
    if (!title) { document.getElementById('inp-title').focus(); return; }
    const reminder = document.getElementById('inp-reminder').value;
    if (reminder !== 'none') {
      if (!(await askNotif())) {
        document.getElementById('inp-reminder').value = 'none';
      } else if (!pushSubscription) {
        // Permission may have just been granted — subscribe now so registerReminder works
        await initPush();
      }
    }

    const wasEditing = editingId;
    let savedTask = null;

    if (editingId) {
      const t = tasks.find(t => t.id === editingId);
      if (t) {
        t.title    = title;
        t.priority = document.getElementById('inp-priority').value;
        t.cat      = document.getElementById('inp-cat').value;
        t.due      = document.getElementById('inp-due').value  || null;
        t.dueTime  = document.getElementById('inp-time').value || null;
        t.reminder = document.getElementById('inp-reminder').value;
        savedTask = t;
      }
    } else {
      savedTask = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2),
        title,
        priority: document.getElementById('inp-priority').value,
        cat:      document.getElementById('inp-cat').value,
        due:      document.getElementById('inp-due').value  || null,
        dueTime:  document.getElementById('inp-time').value || null,
        reminder: document.getElementById('inp-reminder').value,
        done: false,
        created: Date.now(),
      };
      tasks.unshift(savedTask);
    }
    save(); render(); closeSheet();

    if (savedTask) {
      if (savedTask.reminder && savedTask.reminder !== 'none') {
        registerReminder(savedTask);
      } else if (wasEditing) {
        cancelReminder(savedTask.id);
      }
    }
  }

  // ── Wire-up ────────────────────────────────────────────────────────
  document.getElementById('fab').addEventListener('click', openSheet);
  document.getElementById('btn-add').addEventListener('click', addTask);
  document.getElementById('inp-title').addEventListener('keydown', e => e.key === 'Enter' && addTask());
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeSheet();
  });
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  // Re-check reminders whenever the user switches back to the app
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') checkReminders(24 * 60 * 60 * 1000);
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  render();
  scheduleReminders();
  initPush();
</script>
</body>
</html>
